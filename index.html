<!DOCTYPE html>
<html lang="en">
<head>
  <title>KhamChat VIP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: #111; color: #fff; text-align: center; margin: 0; }
    #topBar { background:#222; padding:12px; font-size:18px; display:flex; justify-content:space-between; align-items:center; }
    button { background: #00ff88; color: #000; border: none; padding: 15px 30px; font-size: 16px; border-radius: 10px; margin: 10px; width: 90%; max-width: 400px; cursor: pointer; }
    button.red { background: #ff0088; }
    button.yellow { background: #ffaa00; }
    #adminPanel { display: none; background: #222; padding: 10px; margin: 20px; border-radius: 10px; }
    .request { background: #333; padding: 10px; margin: 5px; border-radius: 5px; display:flex; justify-content:space-between; }
    #shopModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000e; z-index: 99; }
    .modalBox { background:#222; margin:10% auto; padding:20px; width:90%; max-width:400px; border-radius:10px; }
    #voiceBtn { display: none; }
  </style>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
</head>
<body>

  <!-- TOP BAR = BALANCE -->
  <div id="topBar">
    <div>👑 <span id="userId">Guest</span></div>
    <div>Coins: <span id="coinBalance">0</span> <button onclick="openShop()" style="width:auto; padding:5px 10px;">Shop 🛒</button></div>
  </div>

  <h1>🔥 KhamChat VIP 🔥</h1>
  
  <!-- EARN TAB -->
  <button class="yellow" onclick="window.open('https://omg10.com/4/11217324', '_blank')">🎁 Earn Free Coins</button>
  <button onclick="claimCoins()">✅ I Completed Task +100</button>

  <!-- VOICE TAB -->
  <button id="requestBtn">Request to Join Voice</button>
  <button id="voiceBtn" class="red">🎤 Join Voice Now</button>
  <div id="status">Status: Idle</div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <h2>👑 ADMIN PANEL</h2>
    <div id="requestsList"></div>
    <h3>Pending Coin Claims</h3>
    <div id="claimsList"></div>
  </div>

  <!-- SHOP MODAL -->
  <div id="shopModal">
    <div class="modalBox">
      <h2>🛒 VIP Shop</h2>
      <button onclick="buyItem(500, 'VIP Badge')">VIP Badge = 500 Coins</button>
      <button onclick="buyItem(1000, 'Pin Room 1H')">Pin Room 1 Hour = 1000 Coins</button>
      <button class="red" onclick="closeShop()">Close</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAkN35nsJgxKvtVKTH2Y-IIg_jfr2fvDbI",
      authDomain: "khamchat-vip.firebaseapp.com",
      projectId: "khamchat-vip",
      storageBucket: "khamchat-vip.firebasestorage.app",
      messagingSenderId: "1085659754446",
      appId: "1:1085659754446:web:2d61fd965ef97044aec59f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const userId = 'Guest_' + Math.floor(Math.random() * 10000);
    const AGORA_APP_ID = 'd0da6b303ceb4feea2b9652db445f309';
    const CHANNEL_NAME = 'khamchat_vip_room';
    
    document.getElementById('userId').innerText = userId;

    // LOAD COINS
    const userRef = doc(db, "users", userId);
    onSnapshot(userRef, (snap) => {
      if(snap.exists()){
        document.getElementById('coinBalance').innerText = snap.data().coins || 0;
      } else {
        setDoc(userRef, { coins: 0 });
      }
    });

    // EARN COINS - MANUAL CLAIM SYSTEM
    window.claimCoins = async () => {
      await addDoc(collection(db, "claims"), { userId: userId, time: Date.now(), status: 'pending' });
      alert('Claim Sent to Admin. Wait for Approval +100 Coins');
    };

    // VOICE REQUEST
    document.getElementById('requestBtn').onclick = async () => {
      await addDoc(collection(db, "requests"), { userId: userId, time: Date.now() });
      document.getElementById('status').innerText = 'Status: Request Sent... Waiting Admin';
    };

    // ADMIN MODE
    if (window.location.hash === '#admin') {
      document.getElementById('adminPanel').style.display = 'block';
      // Voice Requests
      onSnapshot(collection(db, "requests"), (snap) => {
        document.getElementById('requestsList').innerHTML = '';
        snap.forEach(d => {
          document.getElementById('requestsList').innerHTML += 
          `<div class="request">${d.data().userId} 
           <button onclick="acceptVoice('${d.id}', '${d.data().userId}')">Accept Voice</button></div>`;
        });
      });
      // Coin Claims
      onSnapshot(collection(db, "claims"), (snap) => {
        document.getElementById('claimsList').innerHTML = '';
        snap.forEach(d => {
          if(d.data().status === 'pending'){
            document.getElementById('claimsList').innerHTML += 
            `<div class="request">${d.data().userId} 
             <button onclick="approveClaim('${d.id}', '${d.data().userId}')">Approve +100</button></div>`;
          }
        });
      });
    }
    
    // USER LISTEN FOR ACCEPT
    onSnapshot(doc(db, "accepted", userId), (snap) => {
      if(snap.exists()){
        document.getElementById('voiceBtn').style.display = 'block';
        document.getElementById('status').innerText = 'Status: Accepted! Join Now';
      }
    });

    window.acceptVoice = async (id, uid) => {
      await setDoc(doc(db, "accepted", uid), { ok: true });
      await deleteDoc(doc(db, "requests", id));
      alert(uid + ' Accepted for Voice!');
    };

    window.approveClaim = async (id, uid) => {
      await updateDoc(doc(db, "users", uid), { coins: increment(100) });
      await deleteDoc(doc(db, "claims", id));
      alert(uid + ' +100 Coins Approved!');
    };

    // VOICE BUTTON
    document.getElementById('voiceBtn').onclick = async () => {
      document.getElementById('status').innerText = 'Joining Voice...';
      const client = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
      await client.join(AGORA_APP_ID, CHANNEL_NAME, null, userId);
      const micTrack = await AgoraRTC.createMicrophoneAudioTrack();
      await client.publish(micTrack);
      document.getElementById('status').innerText = 'Status: LIVE IN VOICE 🔴';
    };

    // SHOP SYSTEM
    window.openShop = () => document.getElementById('shopModal').style.display = 'block';
    window.closeShop = () => document.getElementById('shopModal').style.display = 'none';
    
    window.buyItem = async (price, item) => {
      const snap = await getDoc(userRef);
      const coins = snap.data().coins || 0;
      if(coins >= price){
        await updateDoc(userRef, { coins: increment(-price) });
        alert('Bought: ' + item);
      } else {
        alert('Not Enough Coins. Earn More!');
      }
      closeShop();
    };
  </script>
</body>
</html>
