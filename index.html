<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KhamChat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif}
:root{
--bg1:#f5f3ff;--bg2:#ede9fe;--accent:#8b5cf6;--accent2:#a855f7;
--text:#1f2937;--text2:#6b7280;--card:#fff;--border:rgba(139,92,246,0.2);
}
body.dark{
--bg1:#0a0a1f;--bg2:#1a0f2e;--text:#f3f4f6;--text2:#a1a1aa;
--card:rgba(26,15,46,0.7);
}
html,body{height:100vh;width:100vw;overflow:hidden;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--text)}
#app{height:100%;display:flex;flex-direction:column}
.glass{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border)}
.header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;font-weight:700;color:var(--accent)}
.tabs{display:flex;justify-content:space-around;padding:8px;margin:12px;border-radius:16px}
.tab{cursor:pointer;padding:10px 28px;border-radius:12px;font-weight:600;color:var(--text2)}
.tab.active{background:var(--accent);color:#fff}
#chatArea{flex:1;overflow-y:auto;padding:16px}
.userItem{background:var(--card);padding:16px;border-radius:16px;margin-bottom:8px;display:flex;align-items:center;gap:14px}
.userItem img{width:45px;height:45px;border-radius:50%;object-fit:cover}
.message{background:var(--card);padding:12px 16px;border-radius:18px;max-width:75%;margin-bottom:10px}
.message.me{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;margin-left:auto}
.message.bot{background:#fbbf24;color:#000}
.bottom{position:fixed;bottom:0;left:0;right:0;display:flex;padding:12px;background:var(--card)}
.bottom input{flex:1;padding:14px;border:none;border-radius:24px;background:var(--bg2)}
.bottom button{width:46px;height:46px;border:none;border-radius:50%;background:var(--accent);color:#fff}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.modalBox{background:var(--card);padding:24px;border-radius:20px;width:90%;max-width:360px}
.modalBox input,.modalBox select{width:100%;padding:14px;margin-top:12px;border-radius:12px;border:1px solid var(--border)}
.btn{width:100%;padding:14px;margin-top:12px;border:none;border-radius:12px;background:var(--accent);color:#fff}
</style>
</head>
<body>

<div id="app">

<div class="header glass">
<h1>KhamChat</h1>
<span id="setBtn" style="font-size:24px;cursor:pointer">⚙️</span>
</div>

<div class="tabs glass">
<div class="tab active" id="tabUsers">Users</div>
</div>

<div id="chatArea"></div>

<div class="bottom glass" id="bottomBar">
<input id="messageInput" placeholder="Type message...">
<button id="sendBtn">➤</button>
</div>

</div>

<!-- Setup -->
<div class="modal" id="setup">
<div class="modalBox">
<h2>Setup Profile</h2>
<p>Choose a username to start</p>
<input id="username" placeholder="Enter your username" maxlength="15">
<button class="btn" id="startBtn">Start</button>
</div>
</div>

<!-- Settings -->
<div class="modal" id="settingsModal">
<div class="modalBox">
<h3>Settings</h3>

<label>Language</label>
<select id="lang">
<option value="en">English</option>
<option value="ha">Hausa</option>
</select>

<label style="margin-top:12px;display:block;">Theme</label>
<select id="theme">
<option value="light">Light</option>
<option value="dark">Dark</option>
</select>

<label style="margin-top:12px;display:block;">Upload Profile Picture</label>
<input type="file" id="profilePicInput" accept="image/*">

<button class="btn" id="closeSetBtn">Close</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
getFirestore, collection, addDoc, onSnapshot,
serverTimestamp, query, orderBy, setDoc,
doc, getDocs, where, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_STORAGE_BUCKET",
messagingSenderId: "YOUR_SENDER_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let me = null;
let username = "";
let currentChatId = null;

// auth
signInAnonymously(auth);

onAuthStateChanged(auth, async(user)=>{
if(!user) return;
me = user;

const snap = await getDocs(query(
collection(db,"users"),
where("uid","==",user.uid)
));

if(snap.empty){
document.getElementById("setup").classList.add("show");
}else{
username = snap.docs[0].data().displayName;
loadUsers();
}
});

// create profile
document.getElementById("startBtn").onclick = async()=>{
username = document.getElementById("username").value.trim();

if(username.length < 3){
alert("Username must be at least 3 letters");
return;
}

await setDoc(doc(db,"users",me.uid),{
uid:me.uid,
displayName:username,
profilePic:""
});

document.getElementById("setup").classList.remove("show");
loadUsers();
};

// load users
async function loadUsers(){
const snap = await getDocs(collection(db,"users"));
let html = "";

snap.forEach(d=>{
if(d.id===me.uid) return;
const u = d.data();

html += `
<div class="userItem" onclick="openChat('${d.id}','${u.displayName}')">
<img src="${u.profilePic || 'https://via.placeholder.com/45'}">
<div>
<b>${u.displayName}</b>
</div>
</div>
`;
});

html += `
<div class="userItem" onclick="openBotChat()">
✨ <div><b>Khamis AI</b></div>
</div>
`;

document.getElementById("chatArea").innerHTML = html;
}

window.openChat = function(uid,name){
currentChatId = [me.uid,uid].sort().join("_");

document.getElementById("chatArea").innerHTML = "";

const q = query(
collection(db,"chats",currentChatId,"messages"),
orderBy("time","asc")
);

onSnapshot(q,(snapshot)=>{
let html = "";

snapshot.forEach(docSnap=>{
let d = docSnap.data();
html += `
<div class="message ${d.sender===me.uid?'me':''}">
<b>${d.username}</b><br>
${d.text}
</div>
`;
});

document.getElementById("chatArea").innerHTML = html;
});
};

window.openBotChat = function(){
currentChatId = "bot_" + me.uid;
document.getElementById("chatArea").innerHTML = `
<div class="message bot">
<b>Khamis AI</b><br>
Hello 👋 How can I help you?
</div>`;
};

// send message
document.getElementById("sendBtn").onclick = async()=>{
const text = document.getElementById("messageInput").value.trim();
if(!text || !currentChatId) return;

await addDoc(collection(db,"chats",currentChatId,"messages"),{
sender:me.uid,
username:username,
text:text,
time:serverTimestamp()
});

document.getElementById("messageInput").value = "";
};

// settings
document.getElementById("setBtn").onclick=()=>{
document.getElementById("settingsModal").classList.add("show");
};

document.getElementById("closeSetBtn").onclick=()=>{
document.getElementById("settingsModal").classList.remove("show");
};

// theme
document.getElementById("theme").onchange=(e)=>{
if(e.target.value==="dark"){
document.body.classList.add("dark");
}else{
document.body.classList.remove("dark");
}
};

// upload profile picture
document.getElementById("profilePicInput").onchange = async(e)=>{
const file = e.target.files[0];
if(!file) return;

const storageRef = ref(storage,"profiles/"+me.uid);
await uploadBytes(storageRef,file);

const url = await getDownloadURL(storageRef);

await updateDoc(doc(db,"users",me.uid),{
profilePic:url
});

alert("Profile picture updated");
loadUsers();
};
</script>

</body>
</html>
