<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SparkUp</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
:root {
  --pink: #FF2D55;
  --bg: #F5F5F5;
  --blue: #0084FF;
  --card: white;
  --text: #000;
  --border: #eee;
}
body.dark {
  --bg: #121212;
  --card: #1E1E1E;
  --text: #FFF;
  --border: #333;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
html, body { width:100%; height:100%; background:var(--bg); color:var(--text); overflow-x:hidden; transition: background 0.3s, color 0.3s; }
.screen { width:100%; max-width:100%; margin:0; min-height:100vh; background:var(--card); position:relative; }
header { text-align:center; padding:15px; font-size:26px; font-weight:700; color:var(--pink); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.header-icons { display:flex; gap:15px; position:relative; }
.icon-btn { font-size:24px; cursor:pointer; position:relative; }
.badge { position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:700; }
.tabs { display:flex; justify-content:space-around; border-bottom:2px solid var(--border); background:var(--card); overflow-x:auto; }
.tab { padding:12px; font-weight:600; color:#888; cursor:pointer; font-size:14px; white-space:nowrap; }
.tab.active { color:var(--pink); border-bottom:3px solid var(--pink); }

/* NOTIFICATION BOX */
.notif-box { position:absolute; top:50px; right:10px; width:320px; max-height:400px; background:var(--card); border:1px solid var(--border); border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.2); z-index:999; display:none; overflow-y:auto; }
.notif-header { padding:12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; font-weight:600; }
.notif-header button { background:var(--pink); color:white; border:none; padding:6px 10px; border-radius:8px; font-size:12px; cursor:pointer; }
.notif-item { display:flex; align-items:center; gap:10px; padding:12px; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; position:relative; }
.notif-item img { width:45px; height:45px; border-radius:50%; }
.notif-item-menu { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:red; color:white; border:none; padding:6px 10px; border-radius:8px; display:none; }

.auth input,.filter-bar input,.profile-edit input,.profile-edit textarea,.profile-edit select { width:100%; padding:14px; margin:10px 0; border-radius:12px; border:1px solid var(--border); font-size:16px; background:var(--bg); color:var(--text); }
.auth button { width:100%; padding:14px; background:var(--pink); color:white; border:none; border-radius:12px; font-weight:600; font-size:16px; cursor:pointer; margin-top:10px; }
.filter-bar { padding:10px; display:flex; gap:10px; background:var(--bg); }
.filter-bar input { flex:1; padding:12px; border-radius:10px; border:1px solid var(--border); font-size:16px; background:var(--card); color:var(--text); }
.filter-bar button { padding:12px 20px; background:var(--pink); color:white; border:none; border-radius:10px; font-weight:600; font-size:16px; }
.card-wrapper { padding:10px 15px; }
.card { width:100%; height:60vh; border-radius:20px; background-size:cover; background-position:center; box-shadow:0 10px 30px rgba(0,0,0,0.15); position:relative; cursor:pointer; }
.card-info { position:absolute; bottom:0; width:100%; padding:25px 20px; background:linear-gradient(transparent, rgba(0,0,0,0.85)); color:white; border-radius:0 0 20px 20px; }
.card-info h2 { font-size:28px; font-weight:700; display:flex; align-items:center; gap:8px; }
.sponsored-badge { background:var(--pink); padding:4px 8px; border-radius:5px; font-size:12px; font-weight:700; }
.verify { color:#0084FF; font-size:22px; }
.buttons { display:flex; justify-content:center; gap:30px; padding:20px; }
.btn { width:65px; height:65px; border-radius:50%; border:none; font-size:32px; background:var(--card); box-shadow:0 5px 20px rgba(0,0,0,0.1); cursor:pointer; }
.chat-item { display:flex; align-items:center; gap:12px; padding:15px; border-bottom:1px solid var(--border); cursor:pointer; background:var(--card); position:relative; user-select:none; }
.chat-item img { width:55px; height:55px; border-radius:50%; object-fit:cover; }
.chat-window { display:flex; flex-direction:column; height:calc(100vh - 120px); background:var(--card); }
.chat-header { padding:15px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:var(--card); }
.unmatch-btn { margin-left:auto; background:red; color:white; border:none; padding:8px 12px; border-radius:8px; font-size:12px; cursor:pointer; }
.chat-messages { flex:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; background:var(--bg); padding-bottom:80px; }
.msg { max-width:75%; padding:10px 14px; border-radius:18px; font-size:16px; position:relative; user-select:none; }
.msg.me { background:var(--pink); color:white; align-self:flex-end; }
.msg.them { background:var(--border); color:var(--text); align-self:flex-start; }
.chat-input { position:fixed; bottom:0; left:0; right:0; display:flex; padding:10px; border-top:1px solid var(--border); gap:10px; background:var(--card); align-items:center; z-index:99; }
.chat-input input { flex:1; padding:14px 18px; border-radius:25px; border:1px solid var(--border); font-size:16px; background:var(--bg); color:var(--text); }
#btnSend { width:48px; height:48px; border-radius:50%; background:var(--pink); color:white; border:none; font-size:22px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.profile-edit { padding:20px; padding-bottom:80px; }
.profile-edit img { width:120px; height:120px; border-radius:50%; object-fit:cover; display:block; margin:20px auto; border:3px solid var(--pink); }
.profile-edit button { width:100%; padding:14px; background:var(--pink); color:white; border:none; border-radius:12px; font-weight:600; cursor:pointer; margin-top:10px; font-size:16px; }
.verify-btn { background:#0084FF!important; }
.video-btn { background:var(--blue)!important; }
.error { color:red; font-size:14px; margin-top:-5px; margin-bottom:10px; display:none; }
.success { color:green; font-size:14px; margin-top:10px; text-align:center; display:none; }
.hidden { display:none; }
.notification { position:fixed; top:20px; right:20px; background:var(--pink); color:white; padding:15px 20px; border-radius:12px; z-index:999; display:none; }
.loading { text-align:center; padding:50px; font-size:18px; }
.back-btn { cursor:pointer; font-size:24px; }
.setting-item { padding:15px; border-bottom:1px solid var(--border); cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
</style>
</head>
<body>

<div id="notification" class="notification"></div>

<div id="authScreen" class="screen">
  <header>SparkUp <span>⚡</span></header>
  <div class="auth" style="padding:40px 20px;">
    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email" type="email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="signup()" id="btnSignup">Sign Up</button>
    <button onclick="login()" style="background:#333;" id="btnLogin">Login</button>
  </div>
</div>

<div id="appScreen" class="screen hidden">
  <header id="appTitle">
    SparkUp <span>⚡</span>
    <div class="header-icons">
      <div class="icon-btn" onclick="toggleNotifBox()">🔔<span id="notifBadge" class="badge hidden">0</span></div>
      <div id="notifBox" class="notif-box">
        <div class="notif-header">
          <span>❤️ People Who Liked You</span>
          <button onclick="clearAllLikes()">Clear All</button>
        </div>
        <div id="likedList"></div>
      </div>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="showTab('dating', this)" id="tabDiscover">❤️ Discover</div>
    <div class="tab" onclick="showTab('chat', this)" id="tabChat">💬 Chat</div>
    <div class="tab" onclick="showTab('profile', this)" id="tabProfile">👤 Me</div>
    <div class="tab" onclick="showTab('settings', this)" id="tabSettings">⚙️ Settings</div>
  </div>

  <div id="datingTab">
    <div class="filter-bar">
      <input id="filterAgeMin" type="number" placeholder="Min Age">
      <input id="filterAgeMax" type="number" placeholder="Max Age">
      <button onclick="loadProfiles()" id="btnFilter">Filter</button>
    </div>
    <div class="card-wrapper"><div id="cardStack" class="loading">Loading...</div></div>
    <div class="buttons"><button class="btn" onclick="swipe('pass')" style="color:#FF2D55">✕</button><button class="btn" onclick="swipe('like')" style="color:#00D084">❤️</button></div>
  </div>

  <div id="chatTab" class="hidden">
    <div id="chatList"></div>
    <div id="chatWindow" class="hidden chat-window">
      <div class="chat-header">
        <span class="back-btn" onclick="backToChatList()">←</span>
        <img id="chatHeaderPic" src="" style="width:40px; height:40px; border-radius:50%;">
        <h4 id="chatHeaderName"></h4>
        <button class="unmatch-btn" onclick="unmatch(currentChatMatchId)">Unmatch</button>
        <button class="video-btn" style="padding:8px 12px;" onclick="startVideoCall(currentChatMatchId)">📹</button>
      </div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input">
        <input id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" id="btnSend">➤</button>
      </div>
    </div>
  </div>

  <div id="profileTab" class="hidden">
    <div class="profile-edit">
      <h2 id="editTitle">Edit Profile</h2>
      <img id="profilePic" src="">
      <input id="editName" placeholder="Your Name">
      <div id="nameError" class="error">Please enter your name</div>
      <input id="editAge" type="number" placeholder="Your Age">
      <div id="ageError" class="error">Age must be 18+</div>
      <select id="editGender" onchange="updatePreview()">
        <option value="">Select Gender</option>
        <option value="male">Male 👨</option>
        <option value="female">Female 👩</option>
      </select>
      <div id="genderError" class="error">Please select gender</div>
      <textarea id="editBio" placeholder="Your Bio" rows="3"></textarea>
      <div id="bioError" class="error">Please write a bio</div>
      <button onclick="saveProfile()" id="btnSave">Save Changes</button>
      <button class="verify-btn" onclick="requestVerify()" id="btnVerify">Get Verified Badge ✅</button>
      <div id="successMsg" class="success">✅ Profile Saved!</div>
      <button onclick="logout()" style="background:#333;" id="btnLogout">Logout</button>
    </div>
  </div>

  <div id="settingsTab" class="hidden">
    <div class="profile-edit">
      <h2 id="settingsTitle">Settings</h2>
      <div onclick="toggleDarkMode()" class="setting-item">
        <span id="darkModeText">🌙 Dark Mode</span>
        <span id="darkStatus">OFF</span>
      </div>
      <div onclick="toggleLanguage()" class="setting-item">
        <span id="langText">🌍 Language</span>
        <span id="currentLang">English</span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src='https://meet.jit.si/external_api.js'></script>
<script>
const SUPABASE_URL = 'https://tioybcymiumvvaysxjjt.supabase.co'
const SUPABASE_KEY = 'sb_publishable_Y0uC4I6nnLejVficJnh9Ow_fEK4hNyh'
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let user = null; let profiles = []; let currentIndex = 0; let myProfile = null; let matches = []; let api = null;
let currentChatUserId = null; let currentChatMatchId = null; let messageSubscription = null; let longPressTimer;

// ABU 1: DARK MODE + LANGUAGE
const translations = {
  en: {
    discover: "❤️ Discover", chat: "💬 Chat", me: "👤 Me", settings: "⚙️ Settings",
    settingsTitle: "Settings", darkMode: "🌙 Dark Mode", language: "🌍 Language",
    on: "ON", off: "OFF", english: "English", hausa: "Hausa"
  },
  ha: {
    discover: "❤️ Bincika", chat: "💬 Hirra", me: "👤 Ni", settings: "⚙️ Saituna",
    settingsTitle: "Saituna", darkMode: "🌙 Yanayin Duhu", language: "🌍 Harshe",
    on: "A KUNNA", off: "A KASHE", english: "Turanci", hausa: "Hausa"
  }
}
let currentLang = localStorage.getItem('lang') || 'en';

function toggleDarkMode(){
  document.body.classList.toggle('dark');
  localStorage.setItem('darkMode', document.body.classList.contains('dark'));
  updateDarkStatus();
}
function updateDarkStatus(){
  let t = translations[currentLang];
  darkStatus.innerText = document.body.classList.contains('dark')? t.on : t.off;
}
function toggleLanguage(){
  currentLang = currentLang === 'en'? 'ha' : 'en';
  localStorage.setItem('lang', currentLang);
  applyTranslations();
}
function applyTranslations(){
  let t = translations[currentLang];
  tabDiscover.innerHTML = t.discover;
  tabChat.innerHTML = t.chat;
  tabProfile.innerHTML = t.me;
  tabSettings.innerHTML = t.settings;
  settingsTitle.innerText = t.settingsTitle;
  darkModeText.innerText = t.darkMode;
  langText.innerText = t.language;
  currentLang.innerText = currentLang === 'en'? t.english : t.hausa;
  updateDarkStatus();
}

// ABU 2: NOTIFICATION BOX
function toggleNotifBox(){
  notifBox.style.display = notifBox.style.display === 'block'? 'none' : 'block';
  loadLikedUsers();
}
document.addEventListener('click', (e) => {
  if(!e.target.closest('.header-icons')) notifBox.style.display = 'none';
});

// ABU 3: LIKED USERS
async function loadLikedUsers(){
  let {data} = await supa.from('swipes').select('*, profiles!swipes_swiper_id_fkey(*)').eq('swiped_id', user.id).eq('type', 'like');
  likedList.innerHTML = '';
  if(!data || data.length === 0){
    likedList.innerHTML = '<p style="text-align:center; padding:20px; opacity:0.6;">No likes yet</p>';
    notifBadge.classList.add('hidden');
    return;
  }
  notifBadge.innerText = data.length;
  notifBadge.classList.remove('hidden');
  for(let s of data){
    let p = s.profiles;
    let pic = await getAvatar(p.name, p.gender, p.id, p.avatar_url);
    let div = document.createElement('div');
    div.className = 'notif-item';
    div.innerHTML = `<img src="${pic}"><div><b>${p.name}</b>, ${p.age} yrs</div><button class="notif-item-menu" onclick="removeLike('${s.id}')">Delete</button>`;
    addLongPressNotif(div);
    likedList.appendChild(div);
  }
}
function addLongPressNotif(el){
  el.addEventListener('touchstart', () => { longPressTimer = setTimeout(() => showNotifMenu(el), 500); });
  el.addEventListener('touchend', () => clearTimeout(longPressTimer));
  el.addEventListener('mousedown', () => { longPressTimer = setTimeout(() => showNotifMenu(el), 500); });
  el.addEventListener('mouseup', () => clearTimeout(longPressTimer));
}
function showNotifMenu(el){
  document.querySelectorAll('.notif-item-menu').forEach(m => m.style.display='none');
  el.querySelector('.notif-item-menu').style.display = 'block';
}
async function removeLike(swipeId){
  await supa.from('swipes').delete().eq('id', swipeId);
  loadLikedUsers();
  showNotification("Removed");
}
async function clearAllLikes(){
  if(confirm("Clear all likes?")){
    await supa.from('swipes').delete().eq('swiped_id', user.id).eq('type', 'like');
    loadLikedUsers();
    showNotification("Cleared All");
  }
}

// ABU 4: RENDER CARD DA SPONSOR
async function renderCard(){
  if(currentIndex % 8 === 0 && currentIndex!== 0){
    let {data} = await supa.from('sponsors').select('*').eq('is_active', true).limit(1);
    if(data && data.length > 0){
      let s = data[0];
      cardStack.innerHTML = `
      <div class="card" onclick="window.open('${s.link_url}', '_blank')" style="background-image:url(${s.banner_url})">
        <div class="card-info">
          <span class="sponsored-badge">SPONSORED</span>
          <h2>${s.company_name}</h2>
          <p>Tap to visit</p>
        </div>
      </div>`;
      return;
    }
  }
  if(currentIndex >= profiles.length) return cardStack.innerHTML=`<h2 style="text-align:center; padding:50px;">No more profiles 😔</h2>`;
  let p = profiles[currentIndex];
  let pic = await getAvatar(p.name, p.gender, p.id, p.avatar_url);
  cardStack.innerHTML = `<div class="card"><div class="card-info"><h2>${p.name}, ${p.age} ${p.verified? '<span class="verify">✓</span>' : ''}</h2><p>${p.bio}</p></div></div>`;
}

async function getAvatar(name, gender, id, savedUrl){
  if(savedUrl) return savedUrl;
  let hash = 0; for(let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
  let color = (hash & 0x00FFFFFF).toString(16).toUpperCase(); color = "00000".substring(0, 6 - color.length) + color;
  let style = gender === 'female'? `3D golden name "${name}" with #${color} floral frame, luxury flowers and diamonds, black background, elegant royal queen design, highly detailed` : `3D golden name "${name}" with #${color} luxury frame, gold crown and gems, black background, masculine king design, highly detailed`;
  let newUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(style)}?width=400&height=400&seed=${id + name}`;
  await supa.from('profiles').update({avatar_url: newUrl}).eq('id', id);
  return newUrl;
}

supa.auth.getSession().then(({data}) => { if(data.session) loadUser(data.session.user) });
async function signup(){ if(!username.value ||!email.value ||!pass.value) return alert('Fill all fields'); let {data,error}=await supa.auth.signUp({email:email.value,password:pass.value}); if(error) return alert(error.message); await supa.from('profiles').insert([{id:data.user.id, username:username.value, name:username.value, age:18, bio:'Hello', gender:'', verified:false, avatar_url:''}]); loadUser(data.user); }
async function login(){ let {data,error}=await supa.auth.signInWithPassword({email:email.value,password:pass.value}); if(error) return alert(error.message); loadUser(data.user); }
async function loadUser(u){
  user = u;
  let {data} = await supa.from('profiles').select('*').eq('id', user.id).maybeSingle();
  if(!data){
    await supa.from('profiles').insert([{id:user.id, username:email.value.split('@')[0], name:email.value.split('@')[0], age:18, bio:'Hello', gender:'', verified:false, avatar_url:''}]);
    let {data:newData} = await supa.from('profiles').select('*').eq('id', user.id).single();
    data = newData;
  }
  myProfile = data;
  authScreen.classList.add('hidden');
  appScreen.classList.remove('hidden');

  // Load dark mode + language
  if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
  applyTranslations();

  loadProfiles(); loadMatches(); loadLikedUsers();
}
async function loadProfiles(){ let minAge = filterAgeMin.value || 18; let maxAge = filterAgeMax.value || 99; let {data} = await supa.from('profiles').select('*').neq('id',user.id).gte('age', minAge).lte('age', maxAge); profiles = data || []; currentIndex = 0; renderCard(); }
async function swipe(type){ let p = profiles[currentIndex]; await supa.from('swipes').insert([{swiper_id:user.id, swiped_id:p.id, type:type}]); if(type === 'like') checkMatch(p.id, p.name); currentIndex++; renderCard(); }
async function checkMatch(otherId, otherName){ let {data} = await supa.from('swipes').select('*').eq('swiper_id', otherId).eq('swiped_id', user.id).eq('type', 'like').maybeSingle(); if(data){ await supa.from('matches').insert([{user1_id:user.id, user2_id:otherId, created_at: new Date()}]); showNotification("🎉 It's a Match with " + otherName + "!"); loadMatches(); } }
async function loadMatches(){ let {data} = await supa.from('matches').select('*').or(`user1_id.eq.${user.id},user2_id.eq.${user.id}`); matches = data || []; chatList.innerHTML = ''; if(matches.length === 0) return chatList.innerHTML = `<p style="padding:20px; text-align:center;">No matches yet</p>`; for(let m of matches){ let otherId = m.user1_id === user.id? m.user2_id : m.user1_id; let {data:p} = await supa.from('profiles').select('*').eq('id', otherId).single(); let pic = await getAvatar(p.name, p.gender, p.id, p.avatar_url); chatList.innerHTML += `<div class="chat-item" onclick="openChat('${otherId}', '${m.id}', '${p.name}', '${pic}')"><img src="${pic}"><div><h4>${p.name} ${p.verified? '<span class="verify">✓</span>' : ''}</h4><p>Tap to chat</p></div></div>`; } }
async function openChat(otherId, matchId, name, pic){ currentChatUserId = otherId; currentChatMatchId = matchId; chatList.classList.add('hidden'); chatWindow.classList.remove('hidden'); chatHeaderName.innerText = name; chatHeaderPic.src = pic; loadMessages(); }
function backToChatList(){ chatWindow.classList.add('hidden'); chatList.classList.remove('hidden'); }
async function loadMessages(){ let {data} = await supa.from('messages').select('*').or(`and(sender_id.eq.${user.id},receiver_id.eq.${currentChatUserId}),and(sender_id.eq.${currentChatUserId},receiver_id.eq.${user.id})`).order('created_at'); chatMessages.innerHTML = ''; data.forEach(msg => { chatMessages.innerHTML += `<div class="msg ${msg.sender_id === user.id? 'me' : 'them'}">${msg.content}</div>`; }); chatMessages.scrollTop = chatMessages.scrollHeight; }
async function sendMessage(){ let content = messageInput.value.trim(); if(!content) return; await supa.from('messages').insert([{sender_id:user.id, receiver_id:currentChatUserId, content:content}]); messageInput.value = ''; loadMessages(); }
async function unmatch(matchId){ if(confirm("Unmatch?")){ await supa.from('matches').delete().eq('id', matchId); backToChatList(); loadMatches(); } }
function showNotification(msg){ notification.innerText = msg; notification.style.display = 'block'; setTimeout(()=>notification.style.display='none', 4000); }
function showTab(tab, el){ document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); datingTab.classList.add('hidden'); chatTab.classList.add('hidden'); profileTab.classList.add('hidden'); settingsTab.classList.add('hidden'); document.getElementById(tab+'Tab').classList.remove('hidden'); if(tab === 'profile') loadMyProfile(); if(tab === 'chat') loadMatches(); }
async function loadMyProfile(){ let {data} = await supa.from('profiles').select('*').eq('id', user.id).single(); myProfile = data; profilePic.src = await getAvatar(myProfile.name, myProfile.gender, myProfile.id, myProfile.avatar_url); editName.value = myProfile.name || ''; editAge.value = myProfile.age || ''; editBio.value = myProfile.bio || ''; editGender.value = myProfile.gender || ''; }
async function saveProfile(){ document.querySelectorAll('.error').forEach(e => e.style.display='none'); successMsg.style.display='none'; if(!editName.value.trim()) return nameError.style.display='block'; if(!editAge.value || editAge.value < 18) return ageError.style.display='block'; if(!editGender.value) return genderError.style.display='block'; if(!editBio.value.trim()) return bioError.style.display='block'; await supa.from('profiles').update({name: editName.value.trim(), age: parseInt(editAge.value), gender: editGender.value, bio: editBio.value.trim()}).eq('id', user.id); successMsg.style.display='block'; setTimeout(()=>successMsg.style.display='none', 3000); }
async function requestVerify(){ await supa.from('profiles').update({verified: true}).eq('id', user.id); alert("✅ Verified!"); loadMyProfile(); }
async function logout(){ await supa.auth.signOut(); location.reload(); }
</script>
</body>
</html>
