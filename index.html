<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KhamChatCoins - VIP Party</title>
<style>
  html { overflow-y: scroll; }
  body { 
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
    background-attachment: fixed;
    margin: 0; padding: 20px; color: #1a1a1a; 
    min-height: 120vh; /* SCROLL FORCE */
    overflow-x: hidden; touch-action: pan-y;
  }
.container { max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
.glass { background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15); }
  h1, h2, h3, p, span, div, button { color: #1a1a1a; text-shadow: none; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.topbar span { font-weight: 700; font-size: 16px; }
.btn-shop { background: #000; color: #fff!important; border: none; padding: 8px 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
  h1 { text-align: center; font-size: 26px; margin-bottom: 15px; font-weight: 800; }
.btn { width: 100%; padding: 15px; border: none; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: 0.2s; color: #fff!important; }
.btn:hover { transform: scale(1.02); }
.btn-earn { background: linear-gradient(90deg, #ff8a00, #ff3d00); }
.btn-task { background: linear-gradient(90deg, #00c853, #00b0ff); }
.btn-join { background: linear-gradient(90deg, #00e676, #00b0ff); color: #000!important; }
.status { text-align: center; margin-top: 10px; font-weight: 600; }
.video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
  video { width: 100%; border-radius: 15px; background: #000; aspect-ratio: 9/16; object-fit: cover; }
.hidden { display: none!important; }
.spacer { height: 300px; background: rgba(0,0,0,0.05); border-radius: 10px; margin-top: 20px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar glass">
    <span id="userId">👑 Guest_....</span>
    <span>Coins: <b id="coinBalance">0</b></span>
    <button class="btn-shop" onclick="window.open('https://your-shop.com', '_blank')">Shop 🛒</button>
  </div>
  <div class="glass">
    <h1>🔥 KhamChat VIP Party 🔥</h1>
    <button class="btn btn-earn" onclick="window.open('https://omg10.com/4/11217324', '_blank')">🎁 Earn Free Coins</button>
    <button class="btn btn-task" onclick="claim100()">✅ Claim +100 Coins</button>
    <button class="btn btn-join" id="videoBtn">🎥 Join Video Party</button> <!-- NO ONCLICK HERE -->
    <p class="status" id="status">Status: Ready</p>
    <div class="video-grid hidden" id="videoArea">
      <video id="localVideo" autoplay muted playsinline></video>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="spacer">⬇️ SCROLL TEST ⬇️</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const userId = 'Guest_' + Math.floor(Math.random() * 9000 + 1000);
  document.getElementById('userId').innerText = `👑 ${userId}`;
  set(ref(db, 'users/' + userId), { coins: 0 });
  onValue(ref(db, 'users/' + userId + '/coins'), snap => {
    document.getElementById('coinBalance').innerText = snap.val() || 0;
  });

  window.claim100 = () => {
    const coinRef = ref(db, 'users/' + userId + '/coins');
    get(coinRef).then(snap => {
      const current = snap.val() || 0;
      update(ref(db, 'users/' + userId), { coins: current + 100 });
      alert('+100 Coins Added!');
    });
  };

  // === KEY FIX: DIRECT CLICK LISTENER ===
  document.getElementById('videoBtn').addEventListener('click', async () => {
    document.getElementById('videoArea').classList.remove('hidden');
    document.getElementById('status').innerText = 'Status: Requesting Camera...';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
      document.getElementById('localVideo').srcObject = stream;
      document.getElementById('status').innerText = 'Status: In Party';
    } catch (err) {
      document.getElementById('status').innerText = 'Error: ' + err.name;
      alert('Camera Blocked. Close all bubbles/apps. Error: ' + err.name);
    }
  });
</script>
</body>
</html>
