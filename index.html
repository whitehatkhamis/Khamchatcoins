<!DOCTYPE html>
<html lang="en">
<head>
  <title>KhamChat VIP Party</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
    
    /* BACKGROUND VIDEO FLOWERS - TECHNOLOGICAL VIBE */
    #bgVideo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; filter: blur(2px) brightness(0.4); }
    #bgOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(88,0,255,0.3), rgba(255,0,128,0.3)); z-index: -1; }

    /* GLASSMORPHISM UI */
    #topBar { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.2); padding:12px 20px; display:flex; justify-content:space-between; align-items:center; }
   .glassBox { background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 20px; margin: 15px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37); }
    
    button { background: linear-gradient(90deg, #00ff88, #00aaff); color: #000; border: none; padding: 14px 20px; font-size: 16px; font-weight: bold; border-radius: 12px; margin: 8px; width: 100%; cursor: pointer; transition: 0.3s; }
    button:hover { transform: scale(1.02); box-shadow: 0 0 20px #00ff88; }
    button.red { background: linear-gradient(90deg, #ff0088, #ff5500); color: #fff; }
    button.yellow { background: linear-gradient(90deg, #ffaa00, #ff5500); }
    
    /* VIDEO GRID - PARTY VIEW */
    #videoGrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-top: 15px; }
   .videoPlayer { width: 100%; height: 200px; background: #000; border-radius: 15px; border: 2px solid rgba(0,255,136,0.5); }
    
    #adminPanel { display: none; }
    #shopModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000e; z-index: 99; backdrop-filter: blur(10px); }
   .modalBox { background: rgba(34,34,34,0.9); backdrop-filter: blur(20px); margin:10% auto; padding:20px; width:90%; max-width:400px; border-radius:20px; border: 1px solid #fff3; }
  </style>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
</head>
<body>

  <!-- BACKGROUND -->
  <video id="bgVideo" autoplay loop muted playsinline>
    <source src="https://videos.pexels.com/video-files/854384/854384-hd_1920_1080_30fps.mp4" type="video/mp4">
  </video>
  <div id="bgOverlay"></div>

  <!-- TOP BAR -->
  <div id="topBar">
    <div>👑 <span id="userId">Guest</span></div>
    <div>Coins: <span id="coinBalance">0</span> <button onclick="openShop()" style="width:auto; padding:8px 12px;">Shop 🛒</button></div>
  </div>

  <div class="glassBox">
    <h1 style="margin:0; text-shadow:0 0 10px #00ff88;">🔥 KhamChat VIP Party 🔥</h1>
    
    <!-- EARN TAB -->
    <button class="yellow" onclick="window.open('https://omg10.com/4/11217324', '_blank')">🎁 Earn Free Coins</button>
    <button onclick="claimCoins()">✅ I Completed Task +100</button>

    <!-- VOICE/VIDEO TAB -->
    <button id="requestBtn">Request to Join Party</button>
    <button id="voiceBtn" class="red" style="display:none;">🎥 Join Video Party</button>
    <div id="status" style="margin-top:10px;">Status: Idle</div>

    <!-- VIDEO GRID -->
    <div id="videoGrid"></div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="glassBox">
    <h2>👑 ADMIN PANEL</h2>
    <div id="requestsList"></div>
    <h3>Pending Coin Claims</h3>
    <div id="claimsList"></div>
  </div>

  <!-- SHOP MODAL -->
  <div id="shopModal">
    <div class="modalBox">
      <h2>🛒 VIP Shop</h2>
      <button onclick="buyItem(500, 'VIP Badge')">VIP Badge = 500 Coins</button>
      <button onclick="buyItem(1000, 'Pin Room 1H')">Pin Room 1 Hour = 1000 Coins</button>
      <button class="red" onclick="closeShop()">Close</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAkN35nsJgxKvtVKTH2Y-IIg_jfr2fvDbI",
      authDomain: "khamchat-vip.firebaseapp.com",
      projectId: "khamchat-vip",
      storageBucket: "khamchat-vip.firebasestorage.app",
      messagingSenderId: "1085659754446",
      appId: "1:1085659754446:web:2d61fd965ef97044aec59f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const userId = 'Guest_' + Math.floor(Math.random() * 10000);
    const AGORA_APP_ID = 'd0da6b303ceb4feea2b9652db445f309';
    const CHANNEL_NAME = 'khamchat_vip_room';
    
    document.getElementById('userId').innerText = userId;
    let client, localTracks;

    // LOAD COINS
    const userRef = doc(db, "users", userId);
    onSnapshot(userRef, (snap) => {
      document.getElementById('coinBalance').innerText = snap.exists()? snap.data().coins || 0 : 0;
      if(!snap.exists()) setDoc(userRef, { coins: 0 });
    });

    // EARN COINS
    window.claimCoins = async () => {
      await addDoc(collection(db, "claims"), { userId: userId, time: Date.now(), status: 'pending' });
      alert('Claim Sent to Admin. Wait for Approval +100 Coins');
    };

    // REQUEST JOIN
    document.getElementById('requestBtn').onclick = async () => {
      await addDoc(collection(db, "requests"), { userId: userId, time: Date.now() });
      document.getElementById('status').innerText = 'Status: Request Sent... Waiting Admin';
    };

    // ADMIN MODE
    if (window.location.hash === '#admin') {
      document.getElementById('adminPanel').style.display = 'block';
      onSnapshot(collection(db, "requests"), (snap) => {
        document.getElementById('requestsList').innerHTML = '';
        snap.forEach(d => {
          document.getElementById('requestsList').innerHTML += 
          `<div style="display:flex; justify-content:space-between; margin:5px 0;">${d.data().userId} 
           <button style="width:auto;" onclick="acceptVoice('${d.id}', '${d.data().userId}')">Accept</button></div>`;
        });
      });
      onSnapshot(collection(db, "claims"), (snap) => {
        document.getElementById('claimsList').innerHTML = '';
        snap.forEach(d => {
          if(d.data().status === 'pending'){
            document.getElementById('claimsList').innerHTML += 
            `<div style="display:flex; justify-content:space-between; margin:5px 0;">${d.data().userId} 
             <button style="width:auto;" onclick="approveClaim('${d.id}', '${d.data().userId}')">+100</button></div>`;
          }
        });
      });
    }
    
    // LISTEN FOR ACCEPT
    onSnapshot(doc(db, "accepted", userId), (snap) => {
      if(snap.exists()){
        document.getElementById('voiceBtn').style.display = 'block';
        document.getElementById('status').innerText = 'Status: Accepted! Join Party';
      }
    });

    window.acceptVoice = async (id, uid) => {
      await setDoc(doc(db, "accepted", uid), { ok: true });
      await deleteDoc(doc(db, "requests", id));
    };
    window.approveClaim = async (id, uid) => {
      await updateDoc(doc(db, "users", uid), { coins: increment(100) });
      await deleteDoc(doc(db, "claims", id));
    };

    // VIDEO PARTY CODE = THE FIX
    document.getElementById('voiceBtn').onclick = async () => {
      document.getElementById('status').innerText = 'Joining Party...';
      client = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
      await client.join(AGORA_APP_ID, CHANNEL_NAME, null, userId);
      
      // CREATE AUDIO + VIDEO TRACKS
      localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();
      const localPlayer = document.createElement('div');
      localPlayer.id = 'local-' + userId;
      localPlayer.className = 'videoPlayer';
      document.getElementById('videoGrid').appendChild(localPlayer);
      localTracks[1].play(localPlayer.id); // Video Track
      await client.publish(localTracks);

      // SUBSCRIBE TO OTHERS
      client.on('user-published', async (user, mediaType) => {
        await client.subscribe(user, mediaType);
        if (mediaType === 'video') {
          const remotePlayer = document.createElement('div');
          remotePlayer.id = 'remote-' + user.uid;
          remotePlayer.className = 'videoPlayer';
          document.getElementById('videoGrid').appendChild(remotePlayer);
          user.videoTrack.play(remotePlayer.id);
        }
        if (mediaType === 'audio') user.audioTrack.play();
      });
      document.getElementById('status').innerText = 'Status: LIVE IN PARTY 🔴';
    };

    // SHOP
    window.openShop = () => document.getElementById('shopModal').style.display = 'block';
    window.closeShop = () => document.getElementById('shopModal').style.display = 'none';
    window.buyItem = async (price, item) => {
      const snap = await getDoc(userRef);
      if((snap.data().coins || 0) >= price){
        await updateDoc(userRef, { coins: increment(-price) });
        alert('Bought: ' + item);
      } else alert('Not Enough Coins. Earn More!');
      closeShop();
    };
  </script>
</body>
</html>
