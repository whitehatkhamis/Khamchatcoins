<!DOCTYPE html>
<html lang="en">
<head>
<title>KhamChat Party + Ludo FREE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
html, body { 
  margin:0; padding:0; width:100%; 
  overflow-y:auto; background:#0A0A12; 
  font-family:Arial, sans-serif; 
  touch-action: manipulation; 
}
#jitsi-container { width:100%; height:60vh; min-height:400px; background:#000; }
#topbar {
  position:sticky; top:0; left:0; width:100%; height:55px;
  background:#0A0A12; z-index:99999; display:flex; 
  justify-content:space-between; align-items:center; 
  padding:0 10px; box-sizing:border-box;
  border-bottom:1px solid #8A2BE2;
}
#title { color:#fff; background:#8A2BE2; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:900; }
#rewardBtn {
  background:gold;color:#000;border:none;padding:8px 14px;
  border-radius:20px;font-weight:900;font-size:12px;
  box-shadow:0 0 10px gold; cursor:pointer;
}
#ludoBtn {
  width:90%; margin:20px auto; display:block;
  background:#00FF88; color:#000; border:none; padding:14px 28px; 
  border-radius:20px; font-weight:900; font-size:16px; 
  box-shadow:0 0 20px #00FF88; cursor:pointer;
}
.room-frame {
  width:100%; height:100%; border:0; 
}
</style>
</head>
<body>

<div id="topbar">
  <div id="title">🔴 KHAMCHAT WORLD PARTY | 50/50 LIVE</div>
  <button id="rewardBtn" onclick="window.open('https://omg10.com/4/11217324','_blank')">💰 REWARD</button>
</div>

<!-- MAIN PARTY ROOM = VDO.NINJA = FREE UNLIMITED -->
<div id="jitsi-container">
  <iframe 
    id="mainRoom"
    class="room-frame"
    allow="camera; microphone; display-capture; autoplay; fullscreen"
    src="https://vdo.ninja/?room=KhamChatWorldPartyONLY&push=Guest&view=KhamChatWorldPartyONLY&quality=0&autostart&novideo=false&noaudio=false">
  </iframe>
</div>

<button id="ludoBtn" onclick="openLudo()">🎲 LUDO CHALLENGE - VIDEO ON</button>

<div id="ludoBox" style="display:none; width:100%; height:60vh; min-height:400px; margin-top:20px;"></div>
<button id="closeLudo" onclick="closeLudo()" style="width:90%; margin:10px auto; display:none; background:red; color:#fff; border:none; border-radius:20px; padding:10px; font-size:16px; font-weight:900; cursor:pointer;">X CLOSE LUDO ROOM</button>

<script>
function openLudo(){
  document.getElementById('ludoBox').style.display = 'block';
  document.getElementById('closeLudo').style.display = 'block';
  document.getElementById('ludoBtn').style.display = 'none';
  
  const ludoRoomName = "KhamChatLudo" + Math.floor(Math.random()*9999);
  
  document.getElementById('ludoBox').innerHTML = 
  `<iframe 
    class="room-frame"
    allow="camera; microphone; display-capture; autoplay; fullscreen"
    src="https://vdo.ninja/?room=${ludoRoomName}&push=Player&view=${ludoRoomName}&quality=0&autostart&novideo=false&noaudio=false">
  </iframe>`;
}

function closeLudo(){
  document.getElementById('ludoBox').style.display = 'none';
  document.getElementById('closeLudo').style.display = 'none';
  document.getElementById('ludoBtn').style.display = 'block';
  document.getElementById('ludoBox').innerHTML = ''; 
}
</script>
</body>
</html>
