<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KhamChat Global Room</title>
<style>
:root { --bg: #0A0A12; --card: #151521; --purple: #8A2BE2; --pink: #FF2E88; --text: #FFFFFF; --green: #00E676; }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: rgba(10,10,18,0.8); backdrop-filter: blur(10px); }
.header-left { display: flex; align-items: center; gap: 10px; }
.header-left img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--purple); }
.follow-btn { background: linear-gradient(90deg, var(--purple), var(--pink)); border: none; color: #fff; padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 12px; cursor:pointer; }
.main { flex: 1; display: grid; grid-template-columns: 1fr 280px; gap: 12px; padding: 12px; overflow: hidden; }
@media (max-width: 900px) {.main { grid-template-columns: 1fr; }.sidebar { display: none; }
.stage { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; gap: 10px; }
.video-card { background: var(--card); border-radius: 16px; position: relative; overflow: hidden; border: 1px solid #2A2A3D; display: flex; align-items: center; justify-content: center; min-height: 160px; }
.video-card.host { border: 2px solid var(--purple); }
.video-card video { width: 100%; height: 100%; object-fit: cover; background: #000; }
.video-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.7)); pointer-events: none; }
.host-badge { position: absolute; top: 8px; left: 8px; background: var(--purple); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
.slot-num { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); padding: 4px 6px; border-radius: 6px; font-size: 11px; font-weight: 700; }
.user-info { position: absolute; bottom: 8px; left: 8px; }
.user-name { font-weight: 700; font-size: 13px; }
.join-btn { position: absolute; background: var(--pink); border: none; color: #fff; padding: 8px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; z-index:2; }
.sidebar { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
.card { background: var(--card); border-radius: 16px; padding: 12px; border: 1px solid #2A2A3D; }
.chat-box { background: var(--card); border-radius: 16px; padding: 10px; height: 140px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.input-bar { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.input-bar input { flex: 1; background: var(--card); border: 1px solid #2A2A3D; border-radius: 20px; padding: 10px 14px; color: var(--text); outline: none; }
.gift-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--pink); display: grid; place-items: center; border: none; font-size: 20px; cursor: pointer; }
.monetag-ad { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); z-index: 50; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <img id="hostImg" src="https://i.pravatar.cc/100" alt="Host">
    <div>
      <div><b>KhamChat Global Room</b> ✔</div>
      <div id="roomId" style="font-size:12px; color:#B4B4C8;">ID:...</div>
    </div>
  </div>
  <button class="follow-btn" id="joinRoomBtn">🎥 Join Live</button>
</header>

<main class="main">
  <div class="stage" id="stage">
    <div class="video-card host" data-slot="1"><video id="video-1" autoplay playsinline muted></video><div class="video-overlay"></div><div class="host-badge">Host</div><div class="user-info"><div class="user-name" id="name-1">Host</div></div></div>
    <div class="video-card" data-slot="2"><video id="video-2" autoplay playsinline></video><div class="video-overlay"></div><div class="slot-num">2</div><button class="join-btn" onclick="joinSlot(2)">Join</button><div class="user-info"><div class="user-name" id="name-2">Empty</div></div></div>
    <div class="video-card" data-slot="3"><video id="video-3" autoplay playsinline></video><div class="video-overlay"></div><div class="slot-num">3</div><button class="join-btn" onclick="joinSlot(3)">Join</button><div class="user-info"><div class="user-name" id="name-3">Empty</div></div></div>
    <div class="video-card" data-slot="4"><video id="video-4" autoplay playsinline></video><div class="video-overlay"></div><div class="slot-num">4</div><button class="join-btn" onclick="joinSlot(4)">Join</button><div class="user-info"><div class="user-name" id="name-4">Empty</div></div></div>
    <div class="video-card" data-slot="5"><video id="video-5" autoplay playsinline></video><div class="video-overlay"></div><div class="slot-num">5</div><button class="join-btn" onclick="joinSlot(5)">Join</button><div class="user-info"><div class="user-name" id="name-5">Empty</div></div></div>
    <div class="video-card" data-slot="6"><video id="video-6" autoplay playsinline></video><div class="video-overlay"></div><div class="slot-num">6</div><button class="join-btn" onclick="joinSlot(6)">Join</button><div class="user-info"><div class="user-name" id="name-6">Empty</div></div></div>
  </div>

  <aside class="sidebar">
    <div class="card"><b>Popular Gifts</b><div style="margin-top:8px;">🌹 10 💖 100 💎 500</div></div>
  </aside>
</main>

<div style="padding:0 12px 12px;">
  <div class="chat-box" id="chatBox"></div>
  <div class="input-bar">
    <input type="text" id="chatInput" placeholder="Say something...">
    <button class="gift-btn" onclick="sendChat()">➤</button>
  </div>
</div>

<!-- MONETAG AD ZONE -->
<div class="monetag-ad"><script src='https://omg10.com/4/11217324' data-zone='11217324' async></script></div>

<script type="module">
// 1. FIREBASE CONFIG NAKA
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, push, update, remove, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAkN35nsJgxKvtVKTH2Y-IIg_jfr2fvDbI",
  authDomain: "khamchat-vip.firebaseapp.com",
  projectId: "khamchat-vip",
  storageBucket: "khamchat-vip.firebasestorage.app",
  messagingSenderId: "1085659754446",
  appId: "1:1085659754446:web:2d61fd965ef97044aec59f"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const roomId = window.location.hash.substring(1) || 'global';
document.getElementById('roomId').innerText = 'ID: ' + roomId;
const myId = Math.random().toString(36).substr(2, 9);

const pcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
const peers = {}; // {slot: RTCPeerConnection}
let mySlot = 0;
let myStream = null;

// 2. WEBRTC CORE - GLOBAL CONNECT
async function joinSlot(slot) {
  const taken = await get(ref(db, `rooms/${roomId}/slots/${slot}/active`));
  if(taken.exists() && taken.val()) { alert('Slot taken'); return; }
  
  mySlot = slot;
  myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  document.getElementById('video-' + slot).srcObject = myStream;
  document.getElementById('video-' + slot).muted = true;
  
  await set(ref(db, `rooms/${roomId}/slots/${slot}`), { active: true, id: myId, name: 'User' + slot });
  onDisconnect(ref(db, `rooms/${roomId}/slots/${slot}`)).remove();
  document.querySelector(`[data-slot="${slot}"].join-btn`).style.display = 'none';

  // Connect to all other active slots
  const allSlots = await get(ref(db, `rooms/${roomId}/slots`));
  allSlots.forEach(snap => {
    const s = parseInt(snap.key);
    if(s!== slot && snap.val().active) { createPeerConnection(s, true); }
  });
}

function createPeerConnection(remoteSlot, isCaller) {
  const pc = new RTCPeerConnection(pcConfig);
  peers[remoteSlot] = pc;
  myStream.getTracks().forEach(track => pc.addTrack(track, myStream));
  
  pc.ontrack = e => {
    document.getElementById('video-' + remoteSlot).srcObject = e.streams[0];
  };
  
  pc.onicecandidate = e => {
    if(e.candidate) set(ref(db, `rooms/${roomId}/signals/${remoteSlot}/${mySlot}`), { candidate: e.candidate });
  };

  if(isCaller) {
    pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => {
      set(ref(db, `rooms/${roomId}/signals/${remoteSlot}/${mySlot}`), { offer: pc.localDescription });
    });
  }

  // Listen for signals
  onValue(ref(db, `rooms/${roomId}/signals/${mySlot}/${remoteSlot}`), async snap => {
    const data = snap.val(); if(!data) return;
    if(data.offer) {
      await pc.setRemoteDescription(data.offer);
      const ans = await pc.createAnswer();
      await pc.setLocalDescription(ans);
      set(ref(db, `rooms/${roomId}/signals/${remoteSlot}/${mySlot}`), { answer: ans });
    }
    if(data.answer) { pc.setRemoteDescription(data.answer); }
    if(data.candidate) { pc.addIceCandidate(data.candidate); }
  });
}

// 3. LISTEN FOR NEW USERS TO CONNECT TO ME
onValue(ref(db, `rooms/${roomId}/slots`), snap => {
  snap.forEach(s => {
    const sNum = parseInt(s.key);
    if(s.val().active && sNum!== mySlot &&!peers[sNum]) {
      document.getElementById('name-' + sNum).innerText = s.val().name;
      document.querySelector(`[data-slot="${sNum}"].join-btn`).style.display = 'none';
      createPeerConnection(sNum, false); // I am callee
    }
    if(!s.val().active && peers[sNum]) {
      peers[sNum].close(); delete peers[sNum];
      document.getElementById('video-' + sNum).srcObject = null;
      document.getElementById('name-' + sNum).innerText = 'Empty';
      document.querySelector(`[data-slot="${sNum}"].join-btn`).style.display = 'block';
    }
  });
});

// 4. CHAT
onValue(ref(db, `rooms/${roomId}/chat`), snap => {
  const chatBox = document.getElementById('chatBox'); chatBox.innerHTML = '';
  snap.forEach(m => chatBox.innerHTML += `<div><b>${m.val().name}:</b> ${m.val().text}</div>`);
  chatBox.scrollTop = chatBox.scrollHeight;
});
window.sendChat = () => {
  const t = document.getElementById('chatInput').value; if(!t) return;
  push(ref(db, `rooms/${roomId}/chat`), { name: 'User' + mySlot, text: t });
  document.getElementById('chatInput').value = '';
}

window.joinSlot = joinSlot;
document.getElementById('joinRoomBtn').onclick = () => joinSlot(1); // Host
</script>
</body>
</html>
